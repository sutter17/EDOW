<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Generator — DC Episcopal Fellowship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #00277d; --blue: #1a62ff; --cream: #faf3eb;
      --sand: #e9ddcd; --brown: #47342b; --page: #f0f1f5; --border: #ddd0be;
    }
    html, body { height: 100%; }
    body { font-family: Verdana, Geneva, sans-serif; background: var(--page); overflow: hidden; }

    /* ── Toolbar ── */
    .toolbar {
      height: 52px; background: var(--navy); display: flex; align-items: center;
      gap: 10px; padding: 0 18px; box-shadow: 0 2px 8px rgba(0,0,0,.25); flex-shrink: 0;
    }
    .toolbar-title {
      font-family: 'League Spartan', sans-serif; font-size: 14px; font-weight: 800;
      color: #fff; letter-spacing: .05em; text-transform: uppercase; flex: 1;
    }
    .toolbar-status {
      font-family: 'League Spartan', sans-serif; font-size: 11px; color: rgba(255,255,255,.55);
    }
    .btn {
      font-family: 'League Spartan', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase; padding: 7px 14px; border-radius: 3px;
      border: none; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-white   { background: #fff; color: var(--navy); }
    .btn-white:hover:not(:disabled) { background: var(--sand); }
    .btn-outline { background: transparent; color: rgba(255,255,255,.8); border: 1.5px solid rgba(255,255,255,.35); }
    .btn-outline:hover:not(:disabled) { background: rgba(255,255,255,.12); color: #fff; }
    .btn-navy    { background: var(--navy); color: #fff; }
    .btn-navy:hover:not(:disabled) { background: var(--blue); }
    .btn-ghost   { background: transparent; color: var(--brown); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--sand); }
    .btn-danger  { background: transparent; color: #c0392b; border: 1px solid #e0b0b0; }
    .btn-danger:hover:not(:disabled) { background: #fdf0f0; }

    /* ── App layout ── */
    .app {
      display: flex; height: calc(100vh - 52px); overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 290px; flex-shrink: 0; display: flex; flex-direction: column;
      background: var(--cream); border-right: 1px solid var(--border); overflow: hidden;
    }
    .sidebar-top {
      flex-shrink: 0; border-bottom: 1px solid var(--border);
      padding: 10px 0 6px;
    }
    .sidebar-label {
      font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700;
      color: var(--brown); letter-spacing: .06em; text-transform: uppercase;
      padding: 0 14px 6px;
    }
    .section-row {
      display: flex; align-items: center; gap: 8px; padding: 7px 14px;
      cursor: pointer; transition: background .1s; user-select: none;
    }
    .section-row:hover { background: var(--sand); }
    .section-row.selected { background: var(--sand); border-left: 3px solid var(--blue); padding-left: 11px; }
    .section-row.hidden-section { opacity: .45; }
    .section-row-label {
      font-family: 'League Spartan', sans-serif; font-size: 12px; font-weight: 700;
      color: var(--navy); flex: 1;
    }
    .section-row.custom-block .section-row-label { color: var(--brown); }
    .badge {
      font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700;
      background: var(--navy); color: #fff; padding: 1px 6px; border-radius: 8px;
    }
    .section-row.hidden-section .badge { background: #bbb; }
    .vis-btn {
      background: none; border: none; cursor: pointer; padding: 2px 4px;
      color: var(--brown); opacity: .5; font-size: 14px; line-height: 1;
      transition: opacity .15s;
    }
    .vis-btn:hover { opacity: 1; }
    .section-row.hidden-section .vis-btn { opacity: .35; }

    .add-block-btn {
      display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 8px 14px; margin-top: 2px;
      background: none; border: none; cursor: pointer;
      font-family: 'League Spartan', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--blue); letter-spacing: .04em; text-transform: uppercase;
      transition: background .1s;
    }
    .add-block-btn:hover { background: var(--sand); }

    /* ── Edit panel ── */
    .edit-panel {
      flex: 1; overflow-y: auto; padding: 14px;
    }
    .edit-panel-empty {
      display: flex; align-items: center; justify-content: center; height: 100%;
      font-family: 'League Spartan', sans-serif; font-size: 12px; color: var(--brown);
      opacity: .5; text-align: center; padding: 20px;
    }
    .edit-panel-title {
      font-family: 'League Spartan', sans-serif; font-size: 13px; font-weight: 800;
      color: var(--navy); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .04em;
    }
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-family: 'League Spartan', sans-serif; font-size: 10px;
      font-weight: 700; color: var(--brown); letter-spacing: .05em; text-transform: uppercase;
      margin-bottom: 4px;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 7px 9px; font-family: Verdana, Geneva, sans-serif; font-size: 12px;
      border: 1px solid var(--border); border-radius: 3px; background: #fff; color: #000;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: 2px solid var(--blue); border-color: var(--blue);
    }
    .field-note {
      font-size: 11px; color: var(--brown); opacity: .7; margin-top: 4px; line-height: 1.4;
    }
    .event-item {
      border: 1px solid var(--border); border-radius: 3px; margin-bottom: 8px; overflow: hidden;
    }
    .event-item-header {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      background: var(--sand); cursor: pointer; user-select: none;
    }
    .event-item-header:hover { background: #ddd0be; }
    .event-item-title {
      font-family: 'League Spartan', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--navy); flex: 1; line-height: 1.3;
    }
    .event-item-toggle { font-size: 12px; color: var(--brown); }
    .event-item-body { padding: 10px; display: none; background: #fff; }
    .event-item-body.open { display: block; }
    .ev-vis { appearance: none; width: 14px; height: 14px; border: 2px solid var(--border);
               border-radius: 2px; cursor: pointer; flex-shrink: 0; position: relative; }
    .ev-vis:checked { background: var(--navy); border-color: var(--navy); }
    .ev-vis:checked::after { content: '✓'; position: absolute; top: -2px; left: 1px;
                              color: #fff; font-size: 11px; }
    .panel-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    /* ── Preview pane ── */
    .preview-pane {
      flex: 1; overflow-y: auto; padding: 28px 24px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .preview-meta {
      font-family: 'League Spartan', sans-serif; font-size: 10px; font-weight: 700;
      color: var(--brown); letter-spacing: .06em; text-transform: uppercase; opacity: .6;
    }
    #preview-frame {
      width: 640px; max-width: 100%; border: none; border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,.13); background: #fff; display: none;
    }
    .preview-loading {
      font-family: 'League Spartan', sans-serif; font-size: 13px; color: var(--brown);
      padding: 60px 0; text-align: center; opacity: .7;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--navy); color: #fff; font-family: 'League Spartan', sans-serif;
      font-size: 12px; font-weight: 700; padding: 9px 20px; border-radius: 4px;
      pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <span class="toolbar-title">Email Generator</span>
  <span class="toolbar-status" id="status">Loading…</span>
  <button class="btn btn-outline" id="btn-regen"     disabled>Regenerate</button>
  <button class="btn btn-outline" id="btn-copy"      disabled>Copy HTML</button>
  <button class="btn btn-white"   id="btn-download"  disabled>Download</button>
</div>

<!-- App -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">Sections</div>
      <div id="sections-list"></div>
      <button class="add-block-btn" id="btn-add-block">＋ Add Text Block</button>
    </div>
    <div class="edit-panel" id="edit-panel">
      <div class="edit-panel-empty">Click a section to edit it</div>
    </div>
  </aside>

  <!-- Preview -->
  <div class="preview-pane">
    <div class="preview-meta">600px preview — click any section to edit</div>
    <p class="preview-loading" id="preview-loading">Fetching calendar events…</p>
    <iframe id="preview-frame" scrolling="no"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════ */
const C = {
  navy:'#00277d', blue:'#1a62ff', cream:'#faf3eb',
  sand:'#e9ddcd', brown:'#47342b', page:'#f0f1f5',
  border:'#ddd0be', white:'#ffffff', diocese:'#5a8a5a',
};
const FH = '"League Spartan", Arial, Helvetica, sans-serif';
const FB = 'Verdana, Geneva, sans-serif';
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const GCAL_ICS_URL = 'https://calendar.google.com/calendar/ical/'
                   + 'dcepiscopalfellowship%40gmail.com/public/basic.ics';
const CORS_PROXIES = [
  () => `/.netlify/functions/fetch-ics`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}&_=${Date.now()}`,
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  rawEvents: [],
  selected: null,           // currently selected section id
  hiddenSections: new Set(),
  hiddenEvents: new Set(),  // event summaries hidden from output
  expandedEvents: new Set(),// event summaries expanded in sidebar UI
  overrides: {
    season:        'Spring 2026',
    heroUrl:       'images/242e9a9fc21b5f936f40236a56e20ac2.jpg',
    baseUrl:       'https://edow.netlify.app',
    welcomeText:   'As we enter the seasons of Easter and spring, everything is blooming. We celebrate the joy of the resurrection as our world wakes up from its winter slumber. Please join us for our spring events, filled with faith, fellowship, and lots of fun!',
    upcomingIntro: 'This spring, we have a full calendar of fun events! From baseball to scavenger hunts, we hope you will join us as we come together in this season of joy and community. You can find all of the information for all of our events on the DCEF Instagram or Partiful!',
    dioceseIntro:  'We are also partnering with other organizations to host and spread word of events young adults in the diocese might be interested in. If you have any ideas please share them with us!',
    eventDesc: {},   // summary → override string
    eventImg:  {},   // summary → override URL
  },
  customBlocks: [], // [{id, title, body, position}]
  _customBlockId: 0,
};

const FIXED_SECTIONS = [
  { id: 'header',   label: 'Header' },
  { id: 'hero',     label: 'Hero Image' },
  { id: 'welcome',  label: 'Welcome' },
  { id: 'past',     label: 'Past Events' },
  { id: 'upcoming', label: 'Upcoming Events' },
  { id: 'diocese',  label: 'Diocese Events' },
  { id: 'footer',   label: 'Footer' },
];

const BLOCK_POSITIONS = [
  { value: 'after-welcome',  label: 'After Welcome' },
  { value: 'after-past',     label: 'After Past Events' },
  { value: 'after-upcoming', label: 'After Upcoming Events' },
  { value: 'after-diocese',  label: 'After Diocese Events' },
  { value: 'before-footer',  label: 'Before Footer' },
];

/* ═══════════════════════════════════════════════
   DATE HELPERS
═══════════════════════════════════════════════ */
function parseDt(s) {
  const c=s.replace('Z','');
  return new Date(+c.substr(0,4),+c.substr(4,2)-1,+c.substr(6,2),
                  c.length>8?+c.substr(9,2):0, c.length>11?+c.substr(11,2):0);
}
function formatTime(dt) {
  let h=dt.getHours(),m=dt.getMinutes(); const ap=h>=12?'p.m.':'a.m.';
  h=h%12||12; return `${h}:${String(m).padStart(2,'0')} ${ap}`;
}
function formatDateMeta(dt,hasTime,loc) {
  const p=[`${DAY_NAMES[dt.getDay()]}, ${MONTH_NAMES[dt.getMonth()]} ${dt.getDate()}`];
  if(hasTime) p.push(formatTime(dt));
  if(loc) p.push(loc);
  return p.join(' &bull; ');
}

/* ═══════════════════════════════════════════════
   ICS PARSER
═══════════════════════════════════════════════ */
function unescapeICS(s){ return s.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\'); }
function parseICS(text) {
  const lines=text.replace(/\r?\n[ \t]/g,'').split(/\r?\n/);
  const events=[]; let ev=null;
  for(const raw of lines){
    const ci=raw.indexOf(':'); if(ci===-1) continue;
    const keyFull=raw.slice(0,ci).trim(), val=raw.slice(ci+1);
    const key=keyFull.split(';')[0].toUpperCase();
    const params=keyFull.includes(';')?keyFull.slice(keyFull.indexOf(';')+1).toUpperCase():'';
    if(key==='BEGIN'&&val.trim()==='VEVENT'){ev={};continue;}
    if(key==='END'&&val.trim()==='VEVENT'){if(ev)events.push(ev);ev=null;continue;}
    if(!ev) continue;
    const v=unescapeICS(val.trim());
    switch(key){
      case 'SUMMARY':     ev.summary=v;     break;
      case 'DESCRIPTION': ev.description=v; break;
      case 'LOCATION':    ev.location=v;    break;
      case 'URL':         ev.url=v;         break;
      case 'CATEGORIES':  ev.categories=v.toUpperCase().split(',').map(s=>s.trim()); break;
      case 'X-IMAGE':     ev.image=v;       break;
      case 'DTSTART':
        ev.dtstart=parseDt(val.trim());
        ev.hasTime=!(params.includes('VALUE=DATE')||!val.includes('T'));
        break;
    }
  }
  events.forEach(processEvent);
  return events;
}
function processEvent(ev) {
  const raw=ev.description||'';
  if(!ev.url){
    const m=raw.match(/RSVP:\s*<a[^>]+href="([^"]+)"/i)||raw.match(/RSVP:\s*(https?:\/\/[^\s<"]+)/i);
    if(m) ev.url=m[1];
  }
  let desc=raw.replace(/<[^>]+>/g,'');
  desc=desc.replace(/&quot;/g,'"').replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  if(!ev.image){
    desc=desc.replace(/\[image:\s*"?([^"\]\n]+?)"?\s*\]/gi,(_,p)=>{ const p2=p.trim(); ev.image=p2.includes('/')?p2:'images/'+p2; return ''; });
  }
  desc=desc.replace(/RSVP:\s*[^\n]*/gi,'');
  const tagCats=[];
  desc=desc.replace(/#(DIOCESE)\b/gi,(_,c)=>{tagCats.push(c.toUpperCase());return '';});
  ev.description=desc.replace(/\n{3,}/g,'\n\n').trim();
  if(!ev.categories||!ev.categories.length){
    const today=new Date();today.setHours(0,0,0,0);
    ev.categories=tagCats.length?tagCats:[ev.dtstart>=today?'UPCOMING':'PAST'];
  } else if(tagCats.includes('DIOCESE')){ ev.categories=['DIOCESE']; }
}

/* ═══════════════════════════════════════════════
   RESOLVE — apply overrides to events
═══════════════════════════════════════════════ */
function resolveEvents() {
  const today=new Date(); today.setHours(0,0,0,0);
  return state.rawEvents
    .filter(e=>!state.hiddenEvents.has(e.summary))
    .map(e=>({
      ...e,
      description: state.overrides.eventDesc[e.summary] ?? e.description,
      image:        state.overrides.eventImg[e.summary]  ?? e.image,
    }));
}
function categorise(events) {
  const today=new Date(); today.setHours(0,0,0,0);
  return {
    past:     events.filter(e=>e.categories.includes('PAST')).sort((a,b)=>b.dtstart-a.dtstart),
    upcoming: events.filter(e=>e.categories.includes('UPCOMING')&&e.dtstart>=today).sort((a,b)=>a.dtstart-b.dtstart),
    diocese:  events.filter(e=>e.categories.includes('DIOCESE')&&e.dtstart>=today).sort((a,b)=>a.dtstart-b.dtstart),
  };
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function imgUrl(src){
  if(!src) return '';
  if(src.startsWith('http')) return src;
  return `${state.overrides.baseUrl.replace(/\/$/,'')}/${src.replace(/^\//,'')}`;
}
function isHidden(id){ return state.hiddenSections.has(id); }

/* ═══════════════════════════════════════════════
   PREVIEW RENDERER  (div-based, click-friendly)
═══════════════════════════════════════════════ */
function buildPreview() {
  const events = resolveEvents();
  const { past, upcoming, diocese } = categorise(events);
  const o = state.overrides;

  const blocks = [];

  if(!isHidden('header'))   blocks.push(pvSection('header', pvHeader(o)));
  if(!isHidden('hero'))     blocks.push(pvSection('hero', pvHero(o)));
  if(!isHidden('welcome'))  blocks.push(pvSection('welcome', pvWelcome(o)));
  blocksAt('after-welcome').forEach(b=>blocks.push(pvCustomBlock(b)));
  if(!isHidden('past')&&past.length)         blocks.push(pvSection('past', pvPast(past, o)));
  blocksAt('after-past').forEach(b=>blocks.push(pvCustomBlock(b)));
  if(!isHidden('upcoming')&&upcoming.length) blocks.push(pvSection('upcoming', pvUpcoming(upcoming, o)));
  blocksAt('after-upcoming').forEach(b=>blocks.push(pvCustomBlock(b)));
  if(!isHidden('diocese')&&diocese.length)   blocks.push(pvSection('diocese', pvDiocese(diocese, o)));
  blocksAt('after-diocese').forEach(b=>blocks.push(pvCustomBlock(b)));
  blocksAt('before-footer').forEach(b=>blocks.push(pvCustomBlock(b)));
  if(!isHidden('footer'))   blocks.push(pvSection('footer', pvFooter()));

  return `<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0f1f5;font-family:Verdana,Geneva,sans-serif;}
.ew{max-width:600px;margin:16px auto;border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.ps{cursor:pointer;position:relative;outline:2px solid transparent;transition:outline-color .12s;}
.ps:hover{outline-color:rgba(26,98,255,.35);}
.ps.sel{outline-color:#1a62ff;}
.ps-tag{position:absolute;top:0;left:0;background:#1a62ff;color:#fff;font-family:sans-serif;
        font-size:9px;font-weight:700;padding:2px 7px;letter-spacing:.04em;text-transform:uppercase;
        opacity:0;transition:opacity .12s;pointer-events:none;border-radius:0 0 3px 0;z-index:5;}
.ps:hover .ps-tag,.ps.sel .ps-tag{opacity:1;}
.two-col{display:flex;gap:20px;}
.two-col .col{flex:1;min-width:0;}
</style>
</head><body>
<div class="ew">${blocks.join('\n')}</div>
<script>
window.addEventListener('message',e=>{
  if(e.data.type==='select'){
    document.querySelectorAll('.ps').forEach(el=>el.classList.remove('sel'));
    if(e.data.id){ const el=document.querySelector('[data-s="'+e.data.id+'"]'); if(el){el.classList.add('sel');el.scrollIntoView({behavior:'smooth',block:'nearest'});} }
  }
});
document.querySelectorAll('.ps').forEach(el=>{
  el.addEventListener('click',e=>{e.stopPropagation();window.parent.postMessage({type:'sectionClick',id:el.dataset.s},'*');});
});
<\/script>
</body></html>`;
}

function blocksAt(pos){ return state.customBlocks.filter(b=>b.position===pos); }

function pvSection(id, content) {
  const label = FIXED_SECTIONS.find(s=>s.id===id)?.label || id;
  return `<div class="ps" data-s="${id}"><div class="ps-tag">${label}</div>${content}</div>`;
}
function pvCustomBlock(b) {
  return `<div class="ps" data-s="block-${b.id}" style="background:${C.cream};padding:20px 32px;border-top:1px solid ${C.border};">
    <div class="ps-tag">Text Block</div>
    ${b.title?`<p style="font-family:${FH};font-size:15px;font-weight:700;color:${C.navy};margin-bottom:10px;">${esc(b.title)}</p>`:''}
    <p style="font-family:${FB};font-size:13px;line-height:1.7;color:${C.brown};">${esc(b.body||'')}</p>
  </div>`;
}
function pvHeader(o){
  return `<div style="background:${C.navy};padding:20px 24px;text-align:center;">
    <p style="font-family:${FH};font-size:18px;font-weight:800;color:#fff;letter-spacing:.06em;text-transform:uppercase;">DC EPISCOPAL FELLOWSHIP</p>
    <p style="font-family:${FH};font-size:13px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.04em;text-transform:uppercase;margin-top:6px;">${esc(o.season)}</p>
  </div>`;
}
function pvHero(o){
  const url=imgUrl(o.heroUrl);
  return url?`<div style="font-size:0;"><img src="${esc(url)}" style="display:block;width:100%;height:auto;"></div>`
            :`<div style="background:#1a2a4a;height:160px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-family:${FH};font-size:12px;">No hero image set</div>`;
}
function pvWelcome(o){
  return `<div style="background:${C.cream};padding:28px 32px 24px;">
    <p style="font-family:${FB};font-size:14px;line-height:1.75;color:${C.brown};">${esc(o.welcomeText)}</p>
  </div>`;
}
function pvPast(past,o){
  const cells=past.map(ev=>{

function buildEmail() {
  const events=resolveEvents(); const {past,upcoming,diocese}=categorise(events); const o=state.overrides;
  const parts=[emailShellOpen(o)];
  if(!isHidden('header'))   parts.push(emailHeader(o));
  if(!isHidden('hero'))     parts.push(emailHero(o));
  if(!isHidden('welcome'))  parts.push(emailWelcome(o));
  blocksAt('after-welcome').forEach(b=>parts.push(emailCustomBlock(b)));
  if(!isHidden('past')&&past.length)         parts.push(emailPast(past));
  blocksAt('after-past').forEach(b=>parts.push(emailCustomBlock(b)));
  if(!isHidden('upcoming')&&upcoming.length) parts.push(emailUpcoming(upcoming,o));
  blocksAt('after-upcoming').forEach(b=>parts.push(emailCustomBlock(b)));
  if(!isHidden('diocese')&&diocese.length)   parts.push(emailDiocese(diocese,o));
  blocksAt('after-diocese').forEach(b=>parts.push(emailCustomBlock(b)));
  blocksAt('before-footer').forEach(b=>parts.push(emailCustomBlock(b)));
  if(!isHidden('footer'))   parts.push(emailFooter());
  parts.push(emailShellClose());
  return parts.join('\n');
}

function renderSidebarList() {
  const today=new Date(); today.setHours(0,0,0,0);
  const events=resolveEvents(); const {past,upcoming,diocese}=categorise(events);
  const counts={'past':past.length,'upcoming':upcoming.length,'diocese':diocese.length};

  let html='';
  const allSections=[
    ...FIXED_SECTIONS.filter(s=>s.id!=='footer'),
    ...state.customBlocks.map(b=>({id:`block-${b.id}`,label:b.title||'Text Block',isCustom:true})),
    {id:'footer',label:'Footer'},
  ];

  for(const s of allSections){
    const hidden=isHidden(s.id);
    const sel=state.selected===s.id;
    const count=counts[s.id];
    html+=`<div class="section-row${sel?' selected':''}${hidden?' hidden-section':''}${s.isCustom?' custom-block':''}"
              data-sid="${s.id}" onclick="selectSection('${s.id}')">
      <span class="section-row-label">${esc(s.label)}</span>
      ${count?`<span class="badge">${count}</span>`:''}
      <button class="vis-btn" title="${hidden?'Show':'Hide'}" onclick="event.stopPropagation();toggleSection('${s.id}')">${hidden?'○':'●'}</button>
    </div>`;
  }
  document.getElementById('sections-list').innerHTML=html;
}

function renderEditPanel() {
  const panel=document.getElementById('edit-panel');
  const id=state.selected;
  if(!id){ panel.innerHTML=`<div class="edit-panel-empty">Click a section<br>to edit it</div>`; return; }

  // Custom block
  if(id.startsWith('block-')){
    const bid=parseInt(id.replace('block-',''));
    const b=state.customBlocks.find(x=>x.id===bid);
    if(!b){ panel.innerHTML=`<div class="edit-panel-empty">Block not found</div>`; return; }
    panel.innerHTML=`<div class="edit-panel-title">Text Block</div>
      <div class="field"><label>Title (optional)</label>
        <input type="text" id="ep-block-title" value="${esc(b.title||'')}" placeholder="Leave blank for no heading">
      </div>
      <div class="field"><label>Body Text</label>
        <textarea id="ep-block-body" rows="6">${esc(b.body||'')}</textarea>
      </div>
      <div class="field"><label>Position</label>
        <select id="ep-block-pos">
          ${BLOCK_POSITIONS.map(p=>`<option value="${p.value}"${b.position===p.value?' selected':''}>${p.label}</option>`).join('')}
        </select>
      </div>
      <div class="panel-actions">
        <button class="btn btn-danger" onclick="deleteBlock(${bid})">Delete Block</button>
      </div>`;
    document.getElementById('ep-block-title').addEventListener('input',e=>{b.title=e.target.value;scheduleUpdate();renderSidebarList();});
    document.getElementById('ep-block-body').addEventListener('input',e=>{b.body=e.target.value;scheduleUpdate();});
    document.getElementById('ep-block-pos').addEventListener('change',e=>{b.position=e.target.value;scheduleUpdate();renderSidebarList();});
    return;
  }

  switch(id){
    case 'header':
      panel.innerHTML=`<div class="edit-panel-title">Header</div>
        <div class="field"><label>Season / Edition</label>
          <input type="text" id="ep-season" value="${esc(state.overrides.season)}">
        </div>`;
      document.getElementById('ep-season').addEventListener('input',e=>{state.overrides.season=e.target.value;scheduleUpdate();});
      break;

    case 'hero':
      panel.innerHTML=`<div class="edit-panel-title">Hero Image</div>
        <div class="field"><label>Image URL</label>
          <input type="text" id="ep-hero" value="${esc(state.overrides.heroUrl)}">
          <p class="field-note">Use a full URL (Drive, etc.) or a path like <code>images/file.jpg</code></p>
        </div>
        <div class="field"><label>Base URL for relative paths</label>
          <input type="text" id="ep-baseurl" value="${esc(state.overrides.baseUrl)}">
        </div>`;
      document.getElementById('ep-hero').addEventListener('input',e=>{state.overrides.heroUrl=e.target.value;scheduleUpdate();});
      document.getElementById('ep-baseurl').addEventListener('input',e=>{state.overrides.baseUrl=e.target.value;scheduleUpdate();});
      break;

    case 'welcome':
      panel.innerHTML=`<div class="edit-panel-title">Welcome</div>
        <div class="field"><label>Paragraph Text</label>
          <textarea id="ep-welcome" rows="7">${esc(state.overrides.welcomeText)}</textarea>
        </div>`;
      document.getElementById('ep-welcome').addEventListener('input',e=>{state.overrides.welcomeText=e.target.value;scheduleUpdate();});
      break;

    case 'past':
    case 'upcoming':
    case 'diocese': {
      const today2=new Date(); today2.setHours(0,0,0,0);
      const label={'past':'Looking Back','upcoming':'Upcoming Events','diocese':'Diocese Events'}[id];
      let evList=state.rawEvents.filter(e=>e.categories.includes(id.toUpperCase()));
      if(id==='upcoming') evList=evList.filter(e=>e.dtstart>=today2).sort((a,b)=>a.dtstart-b.dtstart);
      if(id==='past')     evList=evList.sort((a,b)=>b.dtstart-a.dtstart);
      if(id==='diocese')  evList=evList.filter(e=>e.dtstart>=today2).sort((a,b)=>a.dtstart-b.dtstart);

      let introField='';
      if(id==='upcoming'){
        introField=`<div class="field"><label>Section Intro</label>
          <textarea id="ep-upintro" rows="4">${esc(state.overrides.upcomingIntro)}</textarea>
        </div>`;
      } else if(id==='diocese'){
        introField=`<div class="field"><label>Section Intro</label>
          <textarea id="ep-diointro" rows="4">${esc(state.overrides.dioceseIntro)}</textarea>
        </div>`;
      }

      const eventItems=evList.map(ev=>{
        const hidden=state.hiddenEvents.has(ev.summary);
        const expanded=state.expandedEvents.has(ev.summary);
        const descVal=state.overrides.eventDesc[ev.summary]??ev.description??'';
        const imgVal=state.overrides.eventImg[ev.summary]??ev.image??'';
        return `<div class="event-item" data-ev="${esc(ev.summary)}">
          <div class="event-item-header" onclick="toggleEventExpand(this)">
            <input type="checkbox" class="ev-vis" ${hidden?'':'checked'}
              onclick="event.stopPropagation();toggleEventVis('${esc(ev.summary).replace(/'/g,"\\'")}')">
            <span class="event-item-title">${esc(ev.summary)}</span>
            <span class="event-item-toggle">${expanded?'▴':'▾'}</span>
          </div>
          <div class="event-item-body${expanded?' open':''}">
            <div class="field"><label>Description override</label>
              <textarea rows="4" onchange="setEventDesc('${esc(ev.summary).replace(/'/g,"\\'")}',this.value)">${esc(descVal)}</textarea>
            </div>
            <div class="field"><label>Image URL override</label>
              <input type="text" value="${esc(imgVal)}" onchange="setEventImg('${esc(ev.summary).replace(/'/g,"\\'")}',this.value)">
              <p class="field-note">Leave blank to use calendar value</p>
            </div>
          </div>
        </div>`;
      }).join('');

      panel.innerHTML=`<div class="edit-panel-title">${esc(label)}</div>
        ${introField}
        <div class="sidebar-label" style="margin-bottom:8px;">Events</div>
        ${eventItems||'<p style="font-size:12px;color:var(--brown);opacity:.6">No events in this category</p>'}`;

      if(id==='upcoming') document.getElementById('ep-upintro')?.addEventListener('input',e=>{state.overrides.upcomingIntro=e.target.value;scheduleUpdate();});
      if(id==='diocese')  document.getElementById('ep-diointro')?.addEventListener('input',e=>{state.overrides.dioceseIntro=e.target.value;scheduleUpdate();});
      break;
    }

    case 'footer':
      panel.innerHTML=`<div class="edit-panel-title">Footer</div>
        <p class="field-note" style="margin-bottom:12px;">The footer text is fixed. Toggle visibility using the ● button in the sections list.</p>`;
      break;

    default:
      panel.innerHTML=`<div class="edit-panel-empty">No editable fields for this section</div>`;
  }
}

/* ═══════════════════════════════════════════════
   UI ACTIONS
═══════════════════════════════════════════════ */
function selectSection(id){
  state.selected=id;
  renderSidebarList();
  renderEditPanel();
  // Tell preview iframe to highlight this section
  const frame=document.getElementById('preview-frame');
  try{ frame.contentWindow.postMessage({type:'select',id},'*'); } catch(e){}
}

function toggleSection(id){
  if(state.hiddenSections.has(id)) state.hiddenSections.delete(id);
  else state.hiddenSections.add(id);
  renderSidebarList();
  scheduleUpdate();
}

function toggleEventVis(summary){
  if(state.hiddenEvents.has(summary)) state.hiddenEvents.delete(summary);
  else state.hiddenEvents.add(summary);
  renderSidebarList();
  scheduleUpdate();
}

function toggleEventExpand(headerEl){
  const body=headerEl.nextElementSibling;
  const summary=headerEl.closest('.event-item').dataset.ev;
  const isOpen=body.classList.toggle('open');
  headerEl.querySelector('.event-item-toggle').textContent=isOpen?'▴':'▾';
  if(isOpen) state.expandedEvents.add(summary);
  else state.expandedEvents.delete(summary);
}

function setEventDesc(summary,val){
  if(val.trim()) state.overrides.eventDesc[summary]=val;
  else delete state.overrides.eventDesc[summary];
  scheduleUpdate();
}
function setEventImg(summary,val){
  if(val.trim()) state.overrides.eventImg[summary]=val;
  else delete state.overrides.eventImg[summary];
  scheduleUpdate();
}

function addBlock(){
  const id=++state._customBlockId;
  state.customBlocks.push({id,title:'',body:'',position:'after-welcome'});
  renderSidebarList();
  selectSection(`block-${id}`);
  scheduleUpdate();
}

function deleteBlock(id){
  state.customBlocks=state.customBlocks.filter(b=>b.id!==id);
  state.selected=null;
  renderSidebarList();
  renderEditPanel();
  scheduleUpdate();
}

/* ═══════════════════════════════════════════════
   PREVIEW UPDATE
═══════════════════════════════════════════════ */
let _updateTimer=null;
function scheduleUpdate(){ clearTimeout(_updateTimer); _updateTimer=setTimeout(updatePreview,280); }

function updatePreview(){
  const frame=document.getElementById('preview-frame');
  const html=buildPreview();
  frame.srcdoc=html;
  frame.onload=()=>{
    try{ frame.style.height=(frame.contentDocument.documentElement.scrollHeight+4)+'px'; }
    catch(e){ frame.style.height='1400px'; }
    // Restore selection highlight after reload
    if(state.selected){
      try{ frame.contentWindow.postMessage({type:'select',id:state.selected},'*'); }catch(e){}
    }
  };
}

function showPreview(){
  document.getElementById('preview-frame').style.display='block';
  document.getElementById('preview-loading').style.display='none';
  document.getElementById('btn-copy').disabled=false;
  document.getElementById('btn-download').disabled=false;
  document.getElementById('btn-regen').disabled=false;
  updatePreview();
}

/* ═══════════════════════════════════════════════
   LOAD EVENTS
═══════════════════════════════════════════════ */
function setStatus(msg){ document.getElementById('status').textContent=msg; }

function applyLoaded(text,src){
  state.rawEvents=parseICS(text);
  const today=new Date();today.setHours(0,0,0,0);
  const u=state.rawEvents.filter(e=>e.categories.includes('UPCOMING')&&e.dtstart>=today).length;
  const p=state.rawEvents.filter(e=>e.categories.includes('PAST')).length;
  const d=state.rawEvents.filter(e=>e.categories.includes('DIOCESE')&&e.dtstart>=today).length;
  setStatus(`${u} upcoming · ${p} past · ${d} diocese${src?' — '+src:''}`);
  renderSidebarList();
  renderEditPanel();
  showPreview();
}

async function loadEvents(){
  setStatus('Fetching calendar…');
  for(const proxy of CORS_PROXIES){
    try{
      const res=await fetch(proxy(GCAL_ICS_URL),{cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text=await res.text();
      if(!text.includes('BEGIN:VCALENDAR')) throw new Error('Invalid ICS');
      applyLoaded(text); return;
    }catch(e){ console.warn('Proxy failed:',e); }
  }
  // Fallback to local events.ics
  try{
    const res=await fetch('events.ics');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(!text.includes('BEGIN:VCALENDAR')) throw new Error('Invalid');
    applyLoaded(text,'local events.ics'); return;
  }catch(e){ console.warn('Local ICS failed:',e); }
  setStatus('Could not load calendar.');
  document.getElementById('preview-loading').textContent='Could not load events. Make sure the calendar is public or place events.ics in the project root.';
}

/* ═══════════════════════════════════════════════
   TOOLBAR ACTIONS
═══════════════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('btn-regen').addEventListener('click',loadEvents);
document.getElementById('btn-copy').addEventListener('click',async()=>{
  try{ await navigator.clipboard.writeText(buildEmail()); showToast('Email HTML copied!'); }
  catch(e){ alert('Copy failed — try Download instead.'); }
});
document.getElementById('btn-download').addEventListener('click',()=>{
  const blob=new Blob([buildEmail()],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`dcef-email-${new Date().toISOString().slice(0,10)}.html`;
  a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById('btn-add-block').addEventListener('click',addBlock);

// Listen for section clicks from preview iframe
window.addEventListener('message',e=>{
  if(e.data?.type==='sectionClick') selectSection(e.data.id);
});

/* ── Init ── */
async function loadSiteContent() {
  try {
    const res  = await fetch('/.netlify/functions/site-content');
    if (!res.ok) return;
    const data = await res.json();
    const strip = (html) => { const d=document.createElement('div'); d.innerHTML=html; return d.textContent||''; };
    if (data.season)         state.overrides.season        = data.season;
    if (data.welcomeText)    state.overrides.welcomeText   = data.welcomeText;
    if (data.upcomingIntro)  state.overrides.upcomingIntro = strip(data.upcomingIntro);
    if (data.dioceseIntro)   state.overrides.dioceseIntro  = strip(data.dioceseIntro);
  } catch (_) {}
}

renderSidebarList();
loadSiteContent().then(() => loadEvents());
</script>
